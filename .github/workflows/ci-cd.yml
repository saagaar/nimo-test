name: CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install root dev dependencies
        run: npm ci

      - name: Install service dependencies
        run: |
          cd crypto-price-service && npm ci
          cd ../search-history-service && npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate SAM template
        run: sam validate --lint -t infra/template.yaml
        env:
          AWS_DEFAULT_REGION: ap-southeast-2

  deploy:
    name: Deploy to AWS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install service dependencies
        run: |
          cd crypto-price-service && npm ci
          cd ../search-history-service && npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Set up SAM CLI  
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        run: sam build -t infra/template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name nimo-crypto \
            --region ap-southeast-2 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides EmailFromAddress=${{ secrets.EMAIL_FROM_ADDRESS }}
