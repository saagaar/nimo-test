AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nimo crypto price service

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps

Resources:
  CryptoSearchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CryptoSearchHistory
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: searchedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: searchedAt
          KeyType: RANGE

  PriceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nimo-crypto-price-service
      CodeUri: ../crypto-price-service/
      Handler: src/handlers/price.handler
      Environment:
        Variables:
          HISTORY_TABLE_NAME: !Ref CryptoSearchHistoryTable
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref CryptoSearchHistoryTable
      Events:
        GetPriceApi:
          Type: Api
          Properties:
            Path: /price
            Method: get

  HistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nimo-search-history-service
      CodeUri: ../search-history-service/
      Handler: src/handlers/getHistory.handler
      Environment:
        Variables:
          HISTORY_TABLE_NAME: !Ref CryptoSearchHistoryTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CryptoSearchHistoryTable
      Events:
        GetHistoryApi:
          Type: Api
          Properties:
            Path: /history
            Method: get

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"