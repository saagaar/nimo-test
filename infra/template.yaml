AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nimo crypto price service

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        NODE_OPTIONS: --enable-source-maps
        # Reuse HTTP keep-alive connections to DynamoDB across invocations.
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"

Resources:
  # ──────────────────────────────────────────────
  # API Gateway — explicit resource enables throttling
  # ──────────────────────────────────────────────
  NimoApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 10   # steady-state requests/sec
          ThrottlingBurstLimit: 20  # token-bucket burst cap

  # ──────────────────────────────────────────────
  # Local dev policy — grants Nima-api user the same DynamoDB
  # permissions needed for sam local testing.
  # Does NOT apply in production (Lambda uses its own execution role).
  # ──────────────────────────────────────────────
  LocalDevDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: NimaApiDynamoDBLocalDev
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem  # needed by sam local PriceFunction
              - dynamodb:Query    # needed by sam local HistoryFunction
            Resource: !GetAtt CryptoSearchHistoryTable.Arn
      Users:
        - Nima-api

  # ──────────────────────────────────────────────
  # DynamoDB Table
  # ──────────────────────────────────────────────
  CryptoSearchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CryptoSearchHistory
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: searchedAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: searchedAt
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        # Uses AWS-managed key by default.

      # Point-in-Time Recovery: disabled for this take-home to keep setup simple.
      # PointInTimeRecoverySpeapcification:
      #   PointInTimeRecoveryEnabled: true

  # ──────────────────────────────────────────────
  # PriceFunction — writes search history
  # ──────────────────────────────────────────────
  PriceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nimo-crypto-price-service
      CodeUri: ../crypto-price-service/
      Handler: src/handlers/price.handler
      Environment:
        Variables:
          HISTORY_TABLE_NAME: !Ref CryptoSearchHistoryTable
      Policies:
        - Statement:
            - Effect: Allow
              # Least privilege: code only calls PutCommand — no delete or update needed.
              Action: dynamodb:PutItem
              Resource: !GetAtt CryptoSearchHistoryTable.Arn
      Events:
        GetPriceApi:
          Type: Api
          Properties:
            RestApiId: !Ref NimoApi
            Path: /price
            Method: get

  # ──────────────────────────────────────────────
  # HistoryFunction — reads search history
  # ──────────────────────────────────────────────
  HistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nimo-search-history-service
      CodeUri: ../search-history-service/
      Handler: src/handlers/getHistory.handler
      Environment:
        Variables:
          HISTORY_TABLE_NAME: !Ref CryptoSearchHistoryTable
      Policies:
        - Statement:
            - Effect: Allow
              # Least privilege: read-only via Query on userId partition key — no Scan or GetItem.
              Action: dynamodb:Query
              Resource: !GetAtt CryptoSearchHistoryTable.Arn
      Events:
        GetHistoryApi:
          Type: Api
          Properties:
            RestApiId: !Ref NimoApi
            Path: /history
            Method: get

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub "https://${NimoApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
